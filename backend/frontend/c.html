<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Maid - Client</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    let panier = [];
    let commandes = [];

    function showSection(sectionId, el) {
      // cacher toutes les sections
      document.querySelectorAll('.section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById(sectionId).classList.remove('hidden');

      // style menu actif
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('text-blue-600','font-bold'));
      el.classList.add('text-blue-600','font-bold');

      // affichage dynamique
      if (sectionId === "panier") afficherPanier();
      if (sectionId === "commandes") afficherCommandes();
    }

    function ajouterPanier(nom, prix, pharmacie) {
      panier.push({ nom, prix, pharmacie });
      alert(nom + " ajouté au panier !");
    }

    function supprimerDuPanier(index) {
      panier.splice(index, 1);
      afficherPanier();
    }

    function afficherPanier() {
      const panierDiv = document.getElementById("contenuPanier");
      panierDiv.innerHTML = "";

      if (panier.length === 0) {
        panierDiv.innerHTML = "<p>Votre panier est vide.</p>";
        return;
      }

      panier.forEach((item, i) => {
        panierDiv.innerHTML += `
          <div class="flex justify-between items-center bg-white p-3 rounded mb-2 shadow">
            <div>
              <p class="font-semibold">${item.nom}</p>
              <p class="text-sm text-gray-500">${item.prix}€ - ${item.pharmacie}</p>
            </div>
            <button onclick="supprimerDuPanier(${i})" class="text-red-500">Supprimer</button>
          </div>
        `;
      });

      panierDiv.innerHTML += `
        <button onclick="validerCommande()" class="mt-4 w-full bg-green-600 text-white py-2 rounded">Valider la commande</button>
      `;
    }

    function validerCommande() {
      if (panier.length === 0) return alert("Votre panier est vide !");
      commandes.push([...panier]); // copie panier
      panier = [];
      alert("Commande validée !");
      showSection("commandes", document.querySelector('[data-section="commandes"]'));
    }

    function afficherCommandes() {
      const commandesDiv = document.getElementById("contenuCommandes");
      commandesDiv.innerHTML = "";

      if (commandes.length === 0) {
        commandesDiv.innerHTML = "<p>Aucune commande passée.</p>";
        return;
      }

      commandes.forEach((cmd, index) => {
        commandesDiv.innerHTML += `
          <div class="bg-white p-4 rounded shadow mb-3">
            <h3 class="font-bold mb-2">Commande #${index+1}</h3>
            ${cmd.map(item => `<p>- ${item.nom} (${item.prix}€ - ${item.pharmacie})</p>`).join("")}
          </div>
        `;
      });
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Header -->
  <header class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-green-600">All Maid</h1>
    <nav class="space-x-6">
      <button onclick="showSection('accueil', this)" class="nav-btn text-blue-600 font-bold" data-section="accueil">Accueil</button>
      <button onclick="showSection('produits', this)" class="nav-btn" data-section="produits">Produits</button>
      <button onclick="showSection('panier', this)" class="nav-btn" data-section="panier">Panier</button>
      <button onclick="showSection('commandes', this)" class="nav-btn" data-section="commandes">Commandes</button>
    </nav>
  </header>

  <!-- Main -->
  <main class="p-6">
    <!-- Accueil -->
    <section id="accueil" class="section">
      <h2 class="text-2xl font-bold mb-4">Bienvenue sur All Maid</h2>
      <input type="text" placeholder="Rechercher une pharmacie ou un produit..." class="border px-4 py-2 rounded-lg w-full mb-6" />
      <p class="text-gray-600">Choisissez une section dans le menu ci-dessus pour commencer.</p>
    </section>

    <!-- Produits -->
    <section id="produits" class="section hidden">
      <h2 class="text-2xl font-bold mb-4">Produits disponibles</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div class="bg-white p-4 rounded-xl shadow">
          <img src="https://via.placeholder.com/150" alt="Produit" class="w-full h-32 object-cover rounded mb-2">
          <h3 class="font-semibold">Doliprane</h3>
          <p class="text-sm text-gray-500">3€ - Pharmacie du Centre</p>
          <button onclick="ajouterPanier('Doliprane', 3, 'Pharmacie du Centre')" class="bg-blue-600 text-white px-3 py-1 rounded mt-2">Ajouter au panier</button>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <img src="https://via.placeholder.com/150" alt="Produit" class="w-full h-32 object-cover rounded mb-2">
          <h3 class="font-semibold">Ibuprofène</h3>
          <p class="text-sm text-gray-500">5€ - Pharmacie République</p>
          <button onclick="ajouterPanier('Ibuprofène', 5, 'Pharmacie République')" class="bg-blue-600 text-white px-3 py-1 rounded mt-2">Ajouter au panier</button>
        </div>
        <div class="bg-white p-4 rounded-xl shadow">
          <img src="https://via.placeholder.com/150" alt="Produit" class="w-full h-32 object-cover rounded mb-2">
          <h3 class="font-semibold">Paracétamol</h3>
          <p class="text-sm text-gray-500">2€ - Pharmacie du Marché</p>
          <button onclick="ajouterPanier('Paracétamol', 2, 'Pharmacie du Marché')" class="bg-blue-600 text-white px-3 py-1 rounded mt-2">Ajouter au panier</button>
        </div>
      </div>
    </section>

    <!-- Panier -->
    <section id="panier" class="section hidden">
      <h2 class="text-2xl font-bold mb-4">Votre panier</h2>
      <div id="contenuPanier"></div>
    </section>

    <!-- Commandes -->
    <section id="commandes" class="section hidden">
      <h2 class="text-2xl font-bold mb-4">Vos commandes</h2>
      <div id="contenuCommandes"></div>
    </section>
  </main>
</body>
</html>
