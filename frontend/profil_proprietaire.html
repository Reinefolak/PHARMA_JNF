<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Pharmacie - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } } } }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    .toast {
      position: fixed; top: 1.5rem; right: 1.5rem;
      padding: 1rem 1.5rem; border-radius: 0.75rem; color: white;
      font-size: 0.9rem; font-weight: 500; z-index: 9999;
      transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(30, 41, 59, 0.7); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-slate-900 dark:text-slate-200">

  <div id="toast" class="toast">
    <i id="toast-icon" data-feather="check-circle" class="h-5 w-5"></i>
    <span id="toast-msg"></span>
  </div>

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 glass mb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-3">
          <a href="proprietaire.html" class="bg-brand-600 p-2 rounded-lg hover:bg-brand-700 transition">
            <i data-feather="arrow-left" class="h-5 w-5 text-white"></i>
          </a>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-green-400 dark:from-green-400 dark:to-brand-200">Profil & Pharmacie</span>
        </div>
        <div class="flex items-center gap-4">
          <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition text-gray-600 dark:text-slate-300 focus:outline-none">
            <i data-feather="moon" id="themeIcon" class="h-5 w-5"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-16 grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Informations Personnelles (Form) -->
    <div class="lg:col-span-1 space-y-6">
      <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-slate-700 text-center">
        <div class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-brand-100 dark:border-slate-700 bg-brand-50 dark:bg-slate-700 flex items-center justify-center text-3xl font-bold text-brand-600 dark:text-green-400" id="avatarInitials">?</div>
        <h2 class="text-xl font-bold text-gray-800 dark:text-white" id="displayName">Propriétaire</h2>
        <p class="text-sm text-gray-500 dark:text-slate-400 mt-1" id="displayEmail">email@exemple.com</p>
      </div>

      <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-slate-700">
        <h3 class="font-bold text-gray-800 dark:text-white mb-4 flex items-center gap-2"><i data-feather="user" class="h-5 w-5 text-brand-500"></i> Infos Personnelles</h3>
        <form id="profileForm" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Prénom</label>
            <input id="prenom" type="text" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Nom</label>
            <input id="nom" type="text" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Téléphone</label>
            <input id="telephone" type="tel" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition">
          </div>
          <button type="submit" class="w-full bg-brand-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold hover:bg-brand-700 transition mt-2 shadow-sm">Enregistrer modifications</button>
        </form>
      </div>
    </div>

    <!-- Fiche Pharmacie & Documents -->
    <div class="lg:col-span-2 space-y-6">
      
      <!-- Fiche Pharmacie -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-slate-700">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-2">
          <h3 class="font-bold text-gray-800 dark:text-white flex items-center gap-2">
            <i data-feather="plus-square" class="h-5 w-5 text-teal-500"></i> Fiche Pharmacie
          </h3>
          <span class="px-2 py-1 bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 rounded-md text-[10px] font-bold uppercase self-start sm:self-auto border border-green-200 dark:border-green-800/50">Vérifiée</span>
        </div>
        
        <form id="pharmaForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Nom de la pharmacie</label>
            <input id="nomPharmacie" type="text" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 dark:text-white outline-none transition">
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Adresse complète</label>
            <input id="adresse" type="text" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 dark:text-white outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Horaires (Ouverture)</label>
            <input type="time" value="08:00" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 dark:text-white outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 dark:text-slate-400 mb-1">Horaires (Fermeture)</label>
            <input type="time" value="23:00" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 dark:text-white outline-none transition">
          </div>
          <div class="md:col-span-2 flex items-center gap-2 mt-2">
            <input type="checkbox" id="garde" class="rounded text-brand-600 focus:ring-brand-500 h-4 w-4 bg-gray-100 border-gray-300 dark:bg-slate-700 dark:border-slate-600">
            <label for="garde" class="text-sm font-medium text-gray-700 dark:text-slate-300">Pharmacie de garde actuellement</label>
          </div>
          <div class="md:col-span-2 text-right mt-2">
            <button type="submit" class="bg-teal-600 text-white rounded-lg px-5 py-2 text-sm font-semibold hover:bg-teal-700 transition shadow-sm">Mettre à jour la fiche</button>
          </div>
        </form>
      </div>

      <!-- Documents Légaux -->
      <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-slate-700">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-3">
          <h3 class="font-bold text-gray-800 dark:text-white flex items-center gap-2">
            <i data-feather="file-text" class="h-5 w-5 text-indigo-500"></i> Documents Légaux & Agréments
          </h3>
          <button class="text-sm bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-lg font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition flex items-center justify-center gap-1 self-start sm:self-auto">
            <i data-feather="upload-cloud" class="h-4 w-4"></i> Uploader
          </button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="border border-gray-200 dark:border-slate-700 rounded-xl p-4 flex gap-4 hover:shadow-md transition cursor-pointer bg-white dark:bg-slate-800">
            <div class="bg-indigo-50 dark:bg-indigo-900/30 p-3 rounded-lg text-indigo-600 dark:text-indigo-400 h-12 w-12 flex items-center justify-center shrink-0">
              <i data-feather="award" class="h-6 w-6"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="font-semibold text-sm text-gray-800 dark:text-slate-200 truncate">Agrément_Ministere.pdf</h4>
              <p class="text-xs text-gray-500 dark:text-slate-400 mt-0.5">Mis à jour le 01/01/2026</p>
              <div class="mt-2 flex flex-wrap gap-2">
                <span class="text-[10px] bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-1.5 py-0.5 rounded font-bold uppercase border border-green-200 dark:border-green-800/50">Approuvé</span>
              </div>
            </div>
          </div>
          
          <div class="border border-gray-200 dark:border-slate-700 rounded-xl p-4 flex gap-4 hover:shadow-md transition cursor-pointer bg-white dark:bg-slate-800">
            <div class="bg-gray-100 dark:bg-slate-700 p-3 rounded-lg text-gray-500 dark:text-slate-400 h-12 w-12 flex items-center justify-center shrink-0">
              <i data-feather="file" class="h-6 w-6"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="font-semibold text-sm text-gray-800 dark:text-slate-200 truncate">KBIS_Pharmacie.pdf</h4>
              <p class="text-xs text-gray-500 dark:text-slate-400 mt-0.5">Ajouté le 15/03/2025</p>
              <div class="mt-2 flex flex-wrap gap-2">
                <span class="text-[10px] bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-1.5 py-0.5 rounded font-bold uppercase border border-green-200 dark:border-green-800/50">Approuvé</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    feather.replace();

    // ---- AUTH & USER DATA ----
    const user = Auth.requireAuth('proprietaire');
    if (user) {
      document.getElementById('prenom').value = user.prenom || '';
      document.getElementById('nom').value = user.nom || '';
      document.getElementById('telephone').value = user.telephone || '';
      document.getElementById('nomPharmacie').value = user.nomPharmacie || '';
      document.getElementById('adresse').value = user.adresse || '';
      
      document.getElementById('displayName').textContent = `${user.prenom || ''} ${user.nom || ''}`;
      document.getElementById('displayEmail').textContent = user.email || '';
      
      const initials = ((user.prenom || '?')[0] + (user.nom || '?')[0]).toUpperCase();
      document.getElementById('avatarInitials').textContent = initials;
    }

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      t.className = `toast ${type} show`;
      document.getElementById('toast-icon').setAttribute('data-feather', type==='success' ? 'check-circle' : 'alert-circle');
      feather.replace();
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Gestion du formulaire personnel
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      saveProfile();
    });

    // Gestion du formulaire pharmacie
    document.getElementById('pharmaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      saveProfile();
    });

    async function saveProfile() {
      const updates = {
        prenom: document.getElementById('prenom').value.trim(),
        nom: document.getElementById('nom').value.trim(),
        telephone: document.getElementById('telephone').value.trim(),
        nomPharmacie: document.getElementById('nomPharmacie').value.trim(),
        adresse: document.getElementById('adresse').value.trim()
      };
      
      try {
        const resp = await fetch(`/api/user/${user.id}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates)
        });
        const data = await resp.json();
        if (data.success) {
          Auth.setUser(data.user);
          showToast('Modifications enregistrées !', 'success');
          document.getElementById('displayName').textContent = `${data.user.prenom} ${data.user.nom}`;
          document.getElementById('avatarInitials').textContent = (data.user.prenom[0] + data.user.nom[0]).toUpperCase();
        } else {
          showToast(data.message, 'error');
        }
      } catch (err) {
        showToast('Erreur réseau.', 'error');
      }
    }

    // ---- DARK MODE ----
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const htmlClass = document.documentElement.classList;

    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      htmlClass.add('dark');
      themeIcon.setAttribute('data-feather', 'sun');
      feather.replace();
    }

    themeToggle.addEventListener('click', () => {
      htmlClass.toggle('dark');
      const isDark = htmlClass.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeIcon.setAttribute('data-feather', isDark ? 'sun' : 'moon');
      feather.replace();
    });
  </script>
</body>
</html>
