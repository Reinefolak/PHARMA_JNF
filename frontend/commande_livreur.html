<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commandes - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
              500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(30, 41, 59, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200">

  <!-- Navigation -->
  <nav class="sticky top-0 z-40 glass">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <i data-feather="activity" class="h-8 w-8 text-brand-600 dark:text-brand-400"></i>
          <span class="ml-2 text-xl font-bold text-brand-600 dark:text-brand-400">PharmaLink Pro</span>
        </div>
        <div class="flex items-center space-x-6">
          <a href="livreur.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:text-brand-400">Accueil</a>
          <a href="pharmacie_livreur.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:text-brand-400">Pharmacies</a>
          <a href="know_livreur.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:text-brand-400">À propos</a>
          <a href="services_livreur.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:text-brand-400">Services</a>
          <a href="contact_livreur.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:text-brand-400">Contact</a>
          <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition text-slate-600 dark:text-slate-300 focus:outline-none ml-4 mr-2">
            <i data-feather="moon" id="themeIcon" class="h-5 w-5"></i>
          </button>
          <a href="login.html" class="bg-brand-600 text-white px-4 py-2 rounded-md font-medium hover:bg-blue-700 transition">
            <i data-feather="log-out" class="h-4 w-4 inline mr-1"></i> Déconnexion
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- En-tête -->
  <section class="relative py-20 bg-gradient-to-br from-brand-600 to-green-500 dark:from-brand-800 dark:to-green-900 text-white text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h1 class="text-4xl font-bold mb-4">Mes commandes</h1>
      <p class="text-brand-100 dark:text-brand-200 text-lg">Consultez vos commandes attribuées et acceptez-les en un clic.</p>
    </div>
  </section>

  <!-- Liste des commandes -->
  <section class="max-w-6xl mx-auto py-16 px-6">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Commandes à gérer</h2>
      <button id="refresh" class="flex items-center bg-brand-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
        <i data-feather="refresh-cw" class="h-5 w-5 mr-2"></i> Rafraîchir
      </button>
    </div>

    <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <p class="col-span-full text-center text-slate-500 dark:text-slate-400" id="loadingMsg">📦 Chargement des commandes...</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 py-8">
    <div class="max-w-7xl mx-auto text-center text-gray-400">
      <p>&copy; 2025 PharmaLink Pro. Tous droits réservés.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script>
    feather.replace();

    // Exemple de données (à remplacer par un appel API réel)
    let commandes = [
      {
        id: 1,
        client: "Jean Dupont",
        adresse: "12 Rue des Lilas, Cotonou",
        produits: "Paracétamol x2, Aspirine x1",
        montant: 15000,
        statut: "En attente"
      },
      {
        id: 2,
        client: "Marie Kossi",
        adresse: "45 Avenue des Palmiers, Porto-Novo",
        produits: "Vitamine C x3",
        montant: 9000,
        statut: "En attente"
      },
      {
        id: 3,
        client: "Aliou Sossou",
        adresse: "23 Rue du Marché, Abomey",
        produits: "Sirop contre toux x1",
        montant: 5000,
        statut: "En attente"
      }
    ];

    // Fonction pour afficher les commandes
    function displayOrders() {
      const listContainer = document.getElementById('ordersList');
      listContainer.innerHTML = '';

      if (commandes.length === 0) {
        listContainer.innerHTML = `
          <div class="col-span-full text-center py-8">
            <i data-feather="alert-circle" class="h-12 w-12 text-yellow-500 mx-auto mb-4"></i>
            <h3 class="text-lg font-medium text-slate-900 dark:text-white">Aucune commande disponible</h3>
          </div>
        `;
        return;
      }

      commandes.forEach(order => {
        const card = document.createElement('div');
        card.className = "bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 rounded-2xl p-6 hover:shadow-lg transition";
        card.innerHTML = `
          <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-2">${order.client}</h3>
          <p class="text-slate-600 dark:text-slate-300 mb-1"><strong>Adresse :</strong> ${order.adresse}</p>
          <p class="text-slate-600 dark:text-slate-300 mb-1"><strong>Produits :</strong> ${order.produits}</p>
          <p class="text-slate-600 dark:text-slate-300 mb-1"><strong>Montant :</strong> ${order.montant.toLocaleString()} FCFA</p>
          <p class="text-slate-600 dark:text-slate-300 mb-4"><strong>Statut :</strong> <span id="status-${order.id}">${order.statut}</span></p>
          <button id="accept-${order.id}" class="bg-brand-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition w-full">
            Accepter la commande
          </button>
        `;
        listContainer.appendChild(card);

        // Ajouter événement pour accepter la commande
        document.getElementById(`accept-${order.id}`).addEventListener('click', () => {
          order.statut = "✅ Acceptée";
          document.getElementById(`status-${order.id}`).textContent = order.statut;
        });
      });

      feather.replace();
    }

    // Rafraîchir la liste (ici simplement re-affiche les données, dans un vrai projet on ferait un appel API)
    document.getElementById('refresh').addEventListener('click', () => {
      document.getElementById('ordersList').innerHTML =
        '<p class="col-span-full text-center text-slate-500 dark:text-slate-400">🔄 Mise à jour en cours...</p>';
      setTimeout(displayOrders, 500); // Simule un temps de chargement
    });

    // Afficher les commandes au chargement
    window.onload = displayOrders;
  </script>

</body>
</html>
