<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gestion des Ventes - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
              500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass { background: rgba(30, 41, 59, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200">

  <!-- Navbar -->
  <nav class="sticky top-0 z-40 glass">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="bg-brand-600 p-2 rounded-lg">
            <i data-feather="shopping-bag" class="h-6 w-6 text-white"></i>
          </div>
          <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-green-400 dark:from-green-400 dark:to-brand-200 hidden sm:block">PharmaLink Pro</span>
        </div>
        <div class="flex items-center gap-3 sm:gap-4">
          <div class="hidden md:flex items-center space-x-6 mr-4">
            <a href="proprietaire.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-green-400 transition">Tableau de bord</a>
            <a href="stock.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-green-400 transition">Stock</a>
            <a href="commandes.html" class="text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-green-400 transition">Commandes</a>
            <a href="vente.html" class="text-brand-600 dark:text-green-400 font-medium transition">Ventes</a>
          </div>

          <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition text-slate-600 dark:text-slate-300 focus:outline-none">
            <i data-feather="moon" id="themeIcon" class="h-5 w-5"></i>
          </button>

          <a href="login.html" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-900 text-white dark:bg-white dark:text-slate-900 rounded-full font-semibold hover:opacity-90 transition text-sm">
            <i data-feather="log-out" class="h-4 w-4"></i> Déconnexion
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="relative py-12 bg-gradient-to-br from-brand-600 to-green-500 dark:from-brand-800 dark:to-green-900 text-white overflow-hidden">
    <div class="absolute top-0 right-0 -mt-10 -mr-10 opacity-10 pointer-events-none">
      <i data-feather="bar-chart-2" class="w-64 h-64"></i>
    </div>
    <div class="max-w-7xl mx-auto px-6 relative z-10">
      <h1 class="text-3xl sm:text-4xl font-bold mb-2">Historique des Ventes</h1>
      <p class="text-green-50 text-lg">Enregistrez vos transactions, visualisez vos revenus et analysez vos performances.</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 space-y-6">

    <!-- Controls -->
    <div class="bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 rounded-2xl p-6">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex-1 max-w-sm relative">
          <i data-feather="search" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></i>
          <input type="text" id="searchSale" class="w-full pl-12 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition" placeholder="Rechercher une vente...">
        </div>
        <div class="flex gap-3">
          <input type="date" id="dateFilter" class="px-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition cursor-pointer">
          <button id="addSaleBtn" class="flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-md shadow-brand-500/30 transition transform hover:-translate-y-0.5 text-sm">
            <i data-feather="plus" class="h-4 w-4"></i> Nouvelle Vente
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700">
          <thead class="bg-slate-50 dark:bg-slate-900/50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Date</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Produit</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Catégorie</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Quantité</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Prix U.</th>
              <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Total</th>
              <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="salesTable" class="divide-y divide-slate-200 dark:divide-slate-700 bg-white dark:bg-slate-800">
            <!-- inserted by JS -->
          </tbody>
          <tfoot class="bg-slate-50 dark:bg-slate-900/80">
            <tr>
              <td colspan="5" class="px-6 py-4 text-right text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide">Total des ventes :</td>
              <td colspan="2" id="totalSales" class="px-6 py-4 text-left text-lg font-black text-brand-600 dark:text-brand-400">0 F</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="saleModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all">
      <div class="p-6 border-b border-slate-100 dark:border-slate-700">
        <h3 class="text-xl font-bold text-slate-900 dark:text-white" id="modalTitle">Nouvelle Vente</h3>
      </div>
      <div class="p-6">
        <form id="saleForm" class="space-y-4">
          <input type="hidden" id="saleId">
          <div>
            <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Produit</label>
            <input type="text" id="saleProduct" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition" required>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Catégorie</label>
            <select id="saleCategory" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition cursor-pointer">
              <option value="Médicaments">Médicaments</option>
              <option value="Cosmétiques">Cosmétiques</option>
              <option value="Accessoires">Accessoires</option>
              <option value="Hygiène">Hygiène</option>
              <option value="Nutrition">Nutrition</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Quantité</label>
              <input type="number" id="saleQuantity" min="1" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition" required>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Prix unitaire (F)</label>
              <input type="number" id="salePrice" min="0" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition" required>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Date</label>
            <input type="date" id="saleDate" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none text-sm dark:text-white transition" required>
          </div>
        </form>
      </div>
      <div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex justify-end gap-3">
        <button type="button" id="cancelSaleBtn" class="px-5 py-2.5 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-xl font-semibold hover:bg-slate-50 dark:hover:bg-slate-600 transition text-sm">Annuler</button>
        <button type="button" id="saveSaleBtn" class="px-5 py-2.5 bg-brand-600 text-white rounded-xl font-semibold hover:bg-brand-700 transition shadow-md shadow-brand-500/30 text-sm">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    feather.replace();

    // Dark Mode Theme init
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const htmlClass = document.documentElement.classList;
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      htmlClass.add('dark'); themeIcon.setAttribute('data-feather', 'sun'); feather.replace();
    }
    themeToggle.addEventListener('click', () => {
      htmlClass.toggle('dark');
      const isDark = htmlClass.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeIcon.setAttribute('data-feather', isDark ? 'sun' : 'moon');
      feather.replace();
    });

    let sales = JSON.parse(localStorage.getItem('pharmalink-sales')) || [
      { id: 1, product: 'Paracétamol 500mg', category: 'Médicaments', quantity: 2, price: 1500, date: '2025-10-21' },
      { id: 2, product: 'Vitamine C', category: 'Nutrition', quantity: 1, price: 3000, date: '2025-10-21' }
    ];

    const salesTable = document.getElementById('salesTable');
    const totalSales = document.getElementById('totalSales');
    const addSaleBtn = document.getElementById('addSaleBtn');
    const saleModal = document.getElementById('saleModal');
    const saleForm = document.getElementById('saleForm');
    const saleId = document.getElementById('saleId');
    const saleProduct = document.getElementById('saleProduct');
    const saleCategory = document.getElementById('saleCategory');
    const saleQuantity = document.getElementById('saleQuantity');
    const salePrice = document.getElementById('salePrice');
    const saleDate = document.getElementById('saleDate');
    const saveSaleBtn = document.getElementById('saveSaleBtn');
    const cancelSaleBtn = document.getElementById('cancelSaleBtn');
    const searchSale = document.getElementById('searchSale');
    const dateFilter = document.getElementById('dateFilter');

    let editing = false;

    function renderSales(filteredSales = sales) {
      salesTable.innerHTML = '';
      let total = 0;

      if (filteredSales.length === 0) {
        salesTable.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500 dark:text-slate-400">Aucune vente enregistrée</td></tr>`;
        totalSales.textContent = "0 F";
        return;
      }

      // Sort by date descending
      filteredSales.sort((a,b) => new Date(b.date) - new Date(a.date));

      filteredSales.forEach(sale => {
        const totalAmount = sale.quantity * sale.price;
        total += totalAmount;

        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-50 dark:hover:bg-slate-700/50 transition';
        row.innerHTML = `
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-400">${formatDate(sale.date)}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900 dark:text-white">${sale.product}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="px-2.5 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg text-xs font-semibold">${sale.category}</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-800 dark:text-slate-200">${sale.quantity}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-400">${sale.price.toLocaleString()} F</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-brand-600 dark:text-brand-400">${totalAmount.toLocaleString()} F</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
            <button class="text-blue-600 dark:text-blue-400 hover:text-blue-800 bg-blue-50 dark:bg-blue-900/30 p-2 rounded-lg mr-2 edit-sale transition" data-id="${sale.id}">
              <i data-feather="edit-2" class="w-4 h-4"></i>
            </button>
            <button class="text-red-600 dark:text-red-400 hover:text-red-800 bg-red-50 dark:bg-red-900/30 p-2 rounded-lg delete-sale transition" data-id="${sale.id}">
              <i data-feather="trash-2" class="w-4 h-4"></i>
            </button>
          </td>
        `;
        salesTable.appendChild(row);
      });

      totalSales.textContent = `${total.toLocaleString()} F`;
      feather.replace();
      attachListeners();
    }

    function attachListeners() {
      document.querySelectorAll('.edit-sale').forEach(btn => {
        btn.addEventListener('click', e => {
          const sale = sales.find(s => s.id === parseInt(e.currentTarget.dataset.id));
          if (sale) openModal(sale);
        });
      });
      document.querySelectorAll('.delete-sale').forEach(btn => {
        btn.addEventListener('click', e => {
          if(confirm('Supprimer cette vente ?')) {
            sales = sales.filter(s => s.id !== parseInt(e.currentTarget.dataset.id));
            localStorage.setItem('pharmalink-sales', JSON.stringify(sales));
            renderSales();
          }
        });
      });
    }

    function openModal(sale = null) {
      editing = sale !== null;
      saleForm.reset();
      document.getElementById('modalTitle').textContent = editing ? 'Modifier la vente' : 'Nouvelle Vente';
      if (editing) {
        saleId.value = sale.id; saleProduct.value = sale.product; saleCategory.value = sale.category;
        saleQuantity.value = sale.quantity; salePrice.value = sale.price; saleDate.value = sale.date;
      } else {
        saleDate.value = new Date().toISOString().split('T')[0];
      }
      saleModal.classList.remove('hidden'); saleModal.classList.add('flex');
    }

    function closeModal() { saleModal.classList.add('hidden'); saleModal.classList.remove('flex'); }

    function saveSale() {
      if(!saleProduct.value || !saleQuantity.value || !salePrice.value) return alert('Remplissez tous les champs.');
      const newSale = {
        product: saleProduct.value, category: saleCategory.value,
        quantity: parseInt(saleQuantity.value), price: parseFloat(salePrice.value), date: saleDate.value
      };
      if (editing) {
        const id = parseInt(saleId.value);
        const index = sales.findIndex(s => s.id === id);
        if (index !== -1) sales[index] = { id, ...newSale };
      } else {
        const newId = sales.length ? Math.max(...sales.map(s => s.id)) + 1 : 1;
        sales.push({ id: newId, ...newSale });
      }
      localStorage.setItem('pharmalink-sales', JSON.stringify(sales));
      renderSales(); closeModal();
    }

    function filterSales() {
      const term = searchSale.value.toLowerCase(); const date = dateFilter.value;
      const filtered = sales.filter(s => (s.product.toLowerCase().includes(term) || s.category.toLowerCase().includes(term)) && (date === '' || s.date === date));
      renderSales(filtered);
    }

    function formatDate(dateString) { return dateString ? new Date(dateString).toLocaleDateString('fr-FR') : '-'; }

    addSaleBtn.addEventListener('click', () => openModal());
    cancelSaleBtn.addEventListener('click', closeModal);
    saveSaleBtn.addEventListener('click', saveSale);
    searchSale.addEventListener('input', filterSales);
    dateFilter.addEventListener('change', filterSales);

    renderSales();
  </script>
</body>
</html>
