<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 50: '#f0fdfa', 500: '#14b8a6', 600: '#0d9488' } } } }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .dark .glass-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }

    .toast { position: fixed; top: 1.5rem; right: 1.5rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 500; z-index: 9999; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }

    .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-loading .spinner { display: inline-block; }
    .btn-loading .btn-text { display: none; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center relative overflow-hidden p-4">

  <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-teal-400/20 dark:bg-teal-600/20 blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-400/20 dark:bg-blue-600/20 blur-[100px] pointer-events-none"></div>

  <button id="themeToggle" class="absolute top-6 right-6 p-2 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 focus:outline-none hover:scale-105 transition z-50">
    <i data-feather="moon" id="themeIcon" class="h-5 w-5"></i>
  </button>

  <div id="toast" class="toast">
    <i id="toast-icon" data-feather="check-circle" class="h-5 w-5"></i>
    <span id="toast-msg"></span>
  </div>

  <div class="w-full max-w-md z-10">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center justify-center bg-gradient-to-tr from-brand-600 to-teal-400 p-3 rounded-2xl shadow-lg shadow-brand-500/30 mb-4 hover:scale-105 transition">
        <i data-feather="activity" class="h-8 w-8 text-white"></i>
      </a>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">Créer un nouveau mot de passe</h2>
      <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">
        Entrez votre nouveau mot de passe ci-dessous pour sécuriser votre compte.
      </p>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-xl shadow-slate-200/50 dark:shadow-none">
      <div id="error-state" class="hidden text-center py-6">
        <i data-feather="alert-triangle" class="h-12 w-12 text-red-500 mx-auto mb-4"></i>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Lien invalide</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400 mt-2">Le lien de réinitialisation est invalide ou a expiré.</p>
        <a href="forgot_password.html" class="inline-block mt-6 px-6 py-2 bg-slate-900 text-white dark:bg-white dark:text-slate-900 rounded-lg font-bold text-sm hover:opacity-90">Demander un nouveau lien</a>
      </div>

      <form id="new-password-form" class="space-y-5" novalidate>
        <div>
          <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Nouveau mot de passe</label>
          <div class="relative">
            <i data-feather="lock" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></i>
            <input id="password" type="password" required class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition placeholder-slate-400" placeholder="••••••••">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wide mb-2">Confirmez le mot de passe</label>
          <div class="relative">
            <i data-feather="check-circle" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></i>
            <input id="confirm-password" type="password" required class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 dark:text-white outline-none transition placeholder-slate-400" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-brand-600 to-teal-500 hover:from-brand-500 hover:to-teal-400 text-white rounded-xl py-3.5 text-sm font-bold transition shadow-lg transform hover:-translate-y-0.5 mt-4">
          <span class="spinner"></span>
          <span class="btn-text">Enregistrer et se connecter</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    feather.replace();

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const htmlClass = document.documentElement.classList;

    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      htmlClass.add('dark');
      themeIcon.setAttribute('data-feather', 'sun');
      feather.replace();
    }

    themeToggle.addEventListener('click', () => {
      htmlClass.toggle('dark');
      const isDark = htmlClass.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeIcon.setAttribute('data-feather', isDark ? 'sun' : 'moon');
      feather.replace();
    });

    // Check token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (!token) {
      document.getElementById('new-password-form').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
    }

    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      t.className = `toast ${type} show`;
      document.getElementById('toast-icon').setAttribute('data-feather', type === 'success' ? 'check-circle' : 'alert-circle');
      feather.replace();
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('new-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm-password').value.trim();
      const btn = document.getElementById('submit-btn');

      if (password.length < 8) return showToast('Le mot de passe doit contenir 8 caractères min.', 'error');
      if (password !== confirm) return showToast('Les mots de passe ne correspondent pas.', 'error');

      btn.classList.add('btn-loading'); btn.disabled = true;

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password })
        });
        const data = await res.json();

        if (data.success) {
          showToast('Mot de passe réinitialisé !', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          showToast(data.message, 'error');
          if(data.message.includes('invalide')) {
            document.getElementById('new-password-form').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
          }
          btn.classList.remove('btn-loading'); btn.disabled = false;
        }
      } catch (err) {
        showToast('Erreur réseau. Vérifiez votre connexion.', 'error');
        btn.classList.remove('btn-loading'); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
