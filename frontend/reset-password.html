<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialiser le mot de passe - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
      min-height: 100vh;
    }
    .card {
      background-color: white;
      box-shadow: 0 25px 35px rgba(0, 0, 0, 0.1);
      border-radius: 1rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 45px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

  <div class="w-full max-w-md space-y-8">
    <div class="text-center text-white">
      <div class="flex items-center justify-center">
        <i data-feather="activity" class="h-10 w-10 text-white"></i>
        <span class="ml-2 text-2xl font-bold">PharmaLink Pro</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold">Créez un nouveau mot de passe</h2>
      <p class="mt-2 text-sm">
        Entrez votre nouveau mot de passe ci-dessous pour sécuriser votre compte.
      </p>
    </div>

    <div class="card p-8">
      <form class="space-y-6" id="new-password-form" action="#" method="POST">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Nouveau mot de passe</label>
          <div class="mt-1 relative">
            <i data-feather="lock" class="absolute left-3 top-2.5 h-5 w-5 text-gray-400"></i>
            <input id="password" name="password" type="password" required
              class="pl-10 pr-3 py-2 block w-full border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
              placeholder="••••••••" />
          </div>
        </div>

        <div>
          <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirmez le mot de passe</label>
          <div class="mt-1 relative">
            <i data-feather="check-circle" class="absolute left-3 top-2.5 h-5 w-5 text-gray-400"></i>
            <input id="confirm-password" name="confirm-password" type="password" required
              class="pl-10 pr-3 py-2 block w-full border border-gray-300 rounded-md focus:ring-green-500 focus:border-green-500"
              placeholder="••••••••" />
          </div>
        </div>

        <button type="submit"
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <i data-feather="refresh-cw" class="h-5 w-5 text-green-300 group-hover:text-green-200"></i>
          </span>
          Mettre à jour le mot de passe
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="login.html" class="text-sm font-medium text-blue-600 hover:text-blue-500 flex items-center justify-center gap-1">
          <i data-feather="arrow-left" class="h-4 w-4"></i> Retour à la connexion
        </a>
      </div>
    </div>
  </div>

  <script>
    feather.replace();

    document.getElementById("new-password-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirm-password").value.trim();

      if (password.length < 8) {
        alert("⚠️ Le mot de passe doit contenir au moins 8 caractères.");
        return;
      }

      if (password !== confirmPassword) {
        alert("❌ Les mots de passe ne correspondent pas.");
        return;
      }

      // Simulation de confirmation (remplacer par un appel backend réel)
      alert("✅ Votre mot de passe a été réinitialisé avec succès !");
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
