<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - PharmaLink Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
      min-height: 100vh;
    }
    .login-card {
      background-color: white;
      box-shadow: 0 25px 35px rgba(0, 0, 0, 0.1);
      border-radius: 1rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .login-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 45px rgba(0, 0, 0, 0.15);
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-loading .spinner { display: inline-block; }
    .btn-loading .btn-text { display: none; }

    .toast {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      padding: 0.9rem 1.4rem;
      border-radius: 0.75rem;
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 9999;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }

    /* Shake animation pour erreur */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

  <!-- Toast notification -->
  <div id="toast" class="toast">
    <i id="toast-icon" data-feather="check-circle" class="h-5 w-5"></i>
    <span id="toast-msg"></span>
  </div>

  <div class="w-full max-w-md space-y-8">
    <div class="text-center text-white">
      <div class="flex items-center justify-center">
        <i data-feather="activity" class="h-10 w-10 text-white"></i>
        <span class="ml-2 text-2xl font-bold">PharmaLink Pro</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold">Connexion à votre compte</h2>
      <p class="mt-2 text-sm">
        Ou <a href="register.html" class="font-medium underline hover:text-gray-200">créez un nouveau compte</a>
      </p>
    </div>

    <div class="login-card p-8">
      <form class="space-y-6" id="login-form" novalidate>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Adresse e-mail</label>
          <div class="mt-1 relative">
            <i data-feather="mail" class="absolute left-3 top-2.5 h-5 w-5 text-gray-400"></i>
            <input id="email" name="email" type="email" autocomplete="email" required
              class="pl-10 pr-3 py-2 block w-full border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
              placeholder="exemple@email.com" />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
          <div class="mt-1 relative">
            <i data-feather="lock" class="absolute left-3 top-2.5 h-5 w-5 text-gray-400"></i>
            <input id="password" name="password" type="password" autocomplete="current-password" required
              class="pl-10 pr-10 py-2 block w-full border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
              placeholder="••••••••" />
            <button type="button" onclick="togglePassword()"
              class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">
              <i id="eye-icon" data-feather="eye" class="h-5 w-5"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox"
              class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 text-sm text-gray-700">Se souvenir de moi</label>
          </div>
          <div class="text-sm">
            <a href="forgot_password.html" class="font-medium text-blue-600 hover:text-blue-500">Mot de passe oublié ?</a>
          </div>
        </div>

        <button type="submit" id="submit-btn"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
          <span class="spinner"></span>
          <span class="btn-text flex items-center gap-2">
            <i data-feather="log-in" class="h-5 w-5 text-blue-300 group-hover:text-blue-200"></i>
            Se connecter
          </span>
        </button>
      </form>

      <!-- Séparateur -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">Ou continuer avec</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <a href="#"
            class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
            <i data-feather="facebook" class="h-5 w-5 text-blue-600"></i>
          </a>
          <a href="#"
            class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
            <svg class="h-5 w-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Si déjà connecté, rediriger
    if (Auth.isLoggedIn()) {
      Auth.redirectByRole(Auth.getUser().role);
    }

    feather.replace();

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-feather', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-feather', 'eye');
      }
      feather.replace();
    }

    function showToast(message, type = 'error') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-msg');
      const toastIcon = document.getElementById('toast-icon');

      toastMsg.textContent = message;
      toast.className = `toast ${type}`;
      toastIcon.setAttribute('data-feather', type === 'success' ? 'check-circle' : 'alert-circle');
      feather.replace();

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Veuillez remplir tous les champs.', 'error');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.classList.add('btn-loading');
      btn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          Auth.setUser(data.user);
          showToast('Connexion réussie ! Redirection...', 'success');
          setTimeout(() => {
            Auth.redirectByRole(data.user.role);
          }, 1000);
        } else {
          showToast(data.message, 'error');
          // Animation shake sur la carte
          const card = document.querySelector('.login-card');
          card.classList.add('shake');
          setTimeout(() => card.classList.remove('shake'), 400);
          btn.classList.remove('btn-loading');
          btn.disabled = false;
        }
      } catch (err) {
        showToast('Erreur réseau. Vérifiez votre connexion.', 'error');
        btn.classList.remove('btn-loading');
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
